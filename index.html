<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>I Love You Sophia Esposito — Interactive Globe</title>
<style>
  body {
    margin: 0;
    background: #0d0d0d;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  #infoBox {
    position: fixed;
    top: 20px;
    left: 20px;
    padding: 12px 18px;
    background: rgba(0,0,0,0.7);
    color: white;
    border-radius: 8px;
    font-size: 16px;
    display: none;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="infoBox"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/* ------------------------------
   LANGUAGE DATA (50 samples)
   Will be duplicated to reach 400
--------------------------------*/
const basePhrases = [
  { lang: "English", text: "I love you, Sophia Esposito" },
  { lang: "Spanish", text: "Te amo, Sophia Esposito" },
  { lang: "French", text: "Je t’aime, Sophia Esposito" },
  { lang: "Italian", text: "Ti amo, Sophia Esposito" },
  { lang: "German", text: "Ich liebe dich, Sophia Esposito" },
  { lang: "Russian", text: "Я люблю тебя, София Эспозито" },
  { lang: "Chinese", text: "我爱你，索菲娅·埃斯波西托" },
  { lang: "Japanese", text: "ソフィア・エスポジート、愛してる" },
  { lang: "Korean", text: "소피아 에스포지토, 사랑해" },
  { lang: "Arabic", text: "أحبك يا صوفيا إسبوزيتو" },
  { lang: "Hindi", text: "मैं तुमसे प्यार करता हूँ, सोफिया एस्पोसिटो" },
  { lang: "Turkish", text: "Seni seviyorum, Sophia Esposito" },
  { lang: "Greek", text: "Σ’ αγαπώ, Sophia Esposito" },
  { lang: "Polish", text: "Kocham cię, Sophia Esposito" },
  { lang: "Dutch", text: "Ik hou van je, Sophia Esposito" },
  { lang: "Swedish", text: "Jag älskar dig, Sophia Esposito" },
  { lang: "Norwegian", text: "Jeg elsker deg, Sophia Esposito" },
  { lang: "Finnish", text: "Rakastan sinua, Sophia Esposito" },
  { lang: "Hebrew", text: "אני אוהב אותך, סופיה אספוזיטו" },
  { lang: "Vietnamese", text: "Anh yêu em, Sophia Esposito" },
  { lang: "Thai", text: "ฉันรักคุณ โซเฟีย เอสโปซิโต" },
  { lang: "Indonesian", text: "Aku mencintaimu, Sophia Esposito" },
  { lang: "Filipino", text: "Mahal kita, Sophia Esposito" },
  { lang: "Swahili", text: "Nakupenda, Sophia Esposito" },
  { lang: "Zulu", text: "Ngiyakuthanda, Sophia Esposito" }
];

// Expand to 400 entries
const phrases = [];
for (let i = 0; i < 400; i++) {
  const p = basePhrases[i % basePhrases.length];
  phrases.push({ lang: p.lang, text: p.text });
}

/* ------------------------------
   THREE.JS SETUP
--------------------------------*/
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 200;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* ------------------------------
   CREATE WORD GLOBE
--------------------------------*/
const group = new THREE.Group();
scene.add(group);

const radius = 80;

phrases.forEach((p, i) => {
  const phi = Math.acos(-1 + (2 * i) / phrases.length);
  const theta = Math.sqrt(phrases.length * Math.PI) * phi;

  const x = radius * Math.cos(theta) * Math.sin(phi);
  const y = radius * Math.sin(theta) * Math.sin(phi);
  const z = radius * Math.cos(phi);

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  ctx.font = "20px Arial";
  canvas.width = ctx.measureText(p.lang).width + 20;
  canvas.height = 30;

  ctx.fillStyle = "white";
  ctx.fillText(p.lang, 10, 20);

  const texture = new THREE.CanvasTexture(canvas);
  const material = new THREE.SpriteMaterial({ map: texture });
  const sprite = new THREE.Sprite(material);

  sprite.position.set(x, y, z);
  sprite.scale.set(20, 10, 1);
  sprite.userData = p;

  group.add(sprite);
});

/* ------------------------------
   DRAG TO ROTATE
--------------------------------*/
let isDragging = false;
let prevX = 0;
let prevY = 0;

document.addEventListener("mousedown", e => {
  isDragging = true;
  prevX = e.clientX;
  prevY = e.clientY;
});

document.addEventListener("mouseup", () => isDragging = false);

document.addEventListener("mousemove", e => {
  if (!isDragging) return;

  const dx = e.clientX - prevX;
  const dy = e.clientY - prevY;

  group.rotation.y += dx * 0.005;
  group.rotation.x += dy * 0.005;

  prevX = e.clientX;
  prevY = e.clientY;
});

/* ------------------------------
   CLICK TO SHOW INFO
--------------------------------*/
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const infoBox = document.getElementById("infoBox");

document.addEventListener("click", e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(group.children);

  if (hits.length > 0) {
    const data = hits[0].object.userData;
    infoBox.style.display = "block";
    infoBox.innerHTML = `<b>${data.lang}</b><br>${data.text}`;
  }
});

/* ------------------------------
   RENDER LOOP
--------------------------------*/
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();

</script>
</body>
</html>
